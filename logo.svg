<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="radiantFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#D4D4D4" />
      <stop offset="100%" stop-color="#888888" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="200" height="200" rx="40" fill="#141414" />

  <path d="M 55 155
           L 55 75
           C 55 40, 115 40, 115 80
           C 115 115, 75 115, 55 115
           C 85 115, 95 145, 135 145
           C 150 145, 160 135, 160 125"
        fill="none"
        stroke="url(#radiantFlow)"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)" />

  <circle cx="160" cy="125" r="6" fill="#FFFFFF" filter="url(#glow)" />
</svg>
